<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>جاري اللعب - لعبة الجوكر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <!-- الهيدر -->
        <div class="game-header">
            <div class="game-code">🎮 رمز: <span id="gameCodeDisplay">---</span></div>
            <div class="turn-indicator" id="turnIndicator">⏳ جاري التحميل...</div>
            <div class="timer" id="turnTimer">30</div>
            <button onclick="leaveGame()" class="leave-btn">🚪 مغادرة</button>
        </div>
        
        <!-- اللاعبون الآخرون -->
        <div class="other-players" id="otherPlayers"></div>
        
        <!-- منطقة اللعب المركزية -->
        <div class="center-area">
            <div class="deck-info">
                <div class="deck-card">🃟</div>
                <div class="deck-count" id="deckCount">0</div>
            </div>
            <div class="played-card-area">
                <div class="played-card" id="playedCard">🎴</div>
                <div class="current-suit" id="currentSuit"></div>
            </div>
        </div>
        
        <!-- أوراق اللاعب -->
        <div class="player-hand" id="playerHand"></div>
        
        <!-- أزرار التحكم -->
        <div class="controls">
            <button onclick="playSelectedCard()" class="play-btn" id="playBtn">🎯 رمي الورقة</button>
            <button onclick="passTurn()" class="pass-btn" id="passBtn" disabled>⏭️ تمرير</button>
        </div>
        
        <!-- الدردشة -->
        <div class="chat-container">
            <div class="chat-header">
                <span>💬 الدردشة</span>
                <button onclick="toggleChat()" class="chat-toggle">_</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" id="chatInput" class="chat-input" placeholder="اكتب رسالة...">
                <div class="emoji-picker">
                    <button onclick="sendEmoji('😊')" class="emoji-btn">😊</button>
                    <button onclick="sendEmoji('🎉')" class="emoji-btn">🎉</button>
                    <button onclick="sendEmoji('🔥')" class="emoji-btn">🔥</button>
                    <button onclick="sendEmoji('😱')" class="emoji-btn">😱</button>
                    <button onclick="sendEmoji('👏')" class="emoji-btn">👏</button>
                </div>
                <button onclick="sendChatMessage()" class="send-btn">📤</button>
            </div>
        </div>
        
        <!-- رسائل اللعبة -->
        <div class="game-messages" id="gameMessages"></div>
    </div>
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <script src="firebase-config.js"></script>
    <script src="auth.js"></script>
    <script src="sound.js"></script>
    <script src="ai.js"></script>
    <script src="chat.js"></script>
    <script src="game.js"></script>
    
    <script>
        let currentGameId = null;
        let currentPlayerId = null;
        let gameData = null;
        let selectedCardIndex = null;
        let turnTimerInterval = null;
        
        // تهيئة اللعبة
        const urlParams = new URLSearchParams(window.location.search);
        currentGameId = urlParams.get('gameId');
        const mode = urlParams.get('mode');
        
        if (!currentGameId) {
            window.location.href = 'index.html';
        }
        
        document.getElementById('gameCodeDisplay').innerText = currentGameId;
        
        // تحميل بيانات اللعبة
        function loadGame() {
            database.ref(`games/${currentGameId}`).on('value', (snapshot) => {
                gameData = snapshot.val();
                if (gameData) {
                    updateGameUI();
                    if (gameData.gameEnded) {
                        handleGameEnd();
                    }
                } else {
                    window.location.href = 'index.html';
                }
            });
        }
        
        function updateGameUI() {
            if (!gameData) return;
            
            const currentPlayer = gameData.players[currentUser.uid];
            if (!currentPlayer) {
                window.location.href = 'index.html';
                return;
            }
            
            const isMyTurn = gameData.currentTurn === currentUser.uid;
            
            // تحديث مؤشر الدور
            const turnIndicator = document.getElementById('turnIndicator');
            if (isMyTurn) {
                turnIndicator.innerHTML = '🎯 دورك الآن!';
                turnIndicator.style.background = '#4CAF50';
            } else {
                const playerTurn = gameData.players[gameData.currentTurn];
                turnIndicator.innerHTML = `⏳ دور: ${playerTurn?.name || 'اللاعب'}`;
                turnIndicator.style.background = '#ff9800';
            }
            
            // تحديث الأوراق
            updatePlayerHand(currentPlayer.hand);
            
            // تحديث اللاعبين الآخرين
            updateOtherPlayers();
            
            // تحديث البطاقة الملعوبة
            if (gameData.playedCards && gameData.playedCards.length > 0) {
                const lastCard = gameData.playedCards[gameData.playedCards.length - 1];
                updatePlayedCard(lastCard);
                document.getElementById('currentSuit').innerHTML = `النوع: ${getSuitName(lastCard.suit)}`;
            }
            
            // تحديث عدد البطاقات
            document.getElementById('deckCount').innerHTML = `${gameData.deck?.length || 0} بطاقة`;
            
            // تحديث الأزرار
            const playBtn = document.getElementById('playBtn');
            const passBtn = document.getElementById('passBtn');
            
            if (isMyTurn && !gameData.gameEnded) {
                playBtn.disabled = false;
                const hasMatchingSuit = checkHasMatchingSuit(currentPlayer.hand, gameData.currentSuit);
                passBtn.disabled = hasMatchingSuit;
            } else {
                playBtn.disabled = true;
                passBtn.disabled = true;
            }
            
            // تحديث المؤقت
            if (isMyTurn && gameData.turnStartTime) {
                startTurnTimer();
            }
        }
        
        function updatePlayerHand(hand) {
            const container = document.getElementById('playerHand');
            container.innerHTML = '';
            
            hand.forEach((card, index) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = `card ${card.suit} ${userData.currentSkin !== 'classic' ? `card-skin-${userData.currentSkin}` : ''}`;
                
                if (card.rank === 'JOKER') {
                    cardDiv.innerHTML = `
                        <div class="card-rank">🃏</div>
                        <div class="card-suit">JOKER</div>
                    `;
                } else {
                    const suitSymbol = getSuitSymbol(card.suit);
                    cardDiv.innerHTML = `
                        <div class="card-rank">${card.rank}</div>
                        <div class="card-suit">${suitSymbol}</div>
                    `;
                }
                
                cardDiv.onclick = () => selectCard(index);
                if (selectedCardIndex === index) {
                    cardDiv.classList.add('selected');
                }
                
                container.appendChild(cardDiv);
            });
        }
        
        function selectCard(index) {
            if (selectedCardIndex === index) {
                selectedCardIndex = null;
            } else {
                selectedCardIndex = index;
            }
            updatePlayerHand(gameData.players[currentUser.uid].hand);
        }
        
        async function playSelectedCard() {
            if (selectedCardIndex === null) {
                addGameMessage('⚠️ الرجاء اختيار ورقة أولاً');
                return;
            }
            
            const currentPlayer = gameData.players[currentUser.uid];
            const selectedCard = currentPlayer.hand[selectedCardIndex];
            const isValid = validateMove(selectedCard, gameData.currentSuit, currentPlayer.hand);
            
            if (!isValid) {
                addGameMessage('❌ لا يمكنك رمي هذه الورقة!');
                return;
            }
            
            playSound('play');
            
            const newHand = [...currentPlayer.hand];
            newHand.splice(selectedCardIndex, 1);
            
            const updates = {
                [`players/${currentUser.uid}/hand`]: newHand,
                [`players/${currentUser.uid}/cardsLeft`]: newHand.length,
                [`playedCards`]: [...gameData.playedCards, selectedCard],
                [`currentSuit`]: selectedCard.rank === 'JOKER' ? gameData.currentSuit : selectedCard.suit,
                turnStartTime: Date.now()
            };
            
            if (newHand.length === 0) {
                updates.gameEnded = true;
                updates.winner = currentUser.uid;
                await handleWin(currentUser.uid);
            } else {
                updates.currentTurn = getNextPlayer();
            }
            
            await database.ref(`games/${currentGameId}`).update(updates);
            selectedCardIndex = null;
        }
        
        async function passTurn() {
            const currentPlayer = gameData.players[currentUser.uid];
            const hasMatchingSuit = checkHasMatchingSuit(currentPlayer.hand, gameData.currentSuit);
            
            if (hasMatchingSuit) {
                addGameMessage('❌ لا يمكنك التمرير! لديك ورقة من نفس النوع');
                return;
            }
            
            playSound('click');
            await database.ref(`games/${currentGameId}`).update({
                currentTurn: getNextPlayer(),
                turnStartTime: Date.now()
            });
            
            addGameMessage(`⏭️ ${currentPlayer.name} قام بالتمرير`);
        }
        
        function validateMove(card, currentSuit, hand) {
            if (card.rank === 'JOKER') return true;
            if (card.suit === currentSuit) return true;
            const hasMatchingSuit = checkHasMatchingSuit(hand, currentSuit);
            return !hasMatchingSuit;
        }
        
        function checkHasMatchingSuit(hand, suit) {
            return hand.some(card => card.suit === suit && card.rank !== 'JOKER');
        }
        
        function getNextPlayer() {
            const order = gameData.playersOrder;
            const currentIndex = order.indexOf(gameData.currentTurn);
            const nextIndex = (currentIndex + 1) % order.length;
            return order[nextIndex];
        }
        
        function updateOtherPlayers() {
            const container = document.getElementById('otherPlayers');
            const otherPlayers = Object.values(gameData.players).filter(p => p.id !== currentUser.uid);
            
            container.innerHTML = otherPlayers.map(player => `
                <div class="player-card ${gameData.currentTurn === player.id ? 'active-turn' : ''}">
                    <div class="player-name">${player.name} ${player.isAI ? '🤖' : ''}</div>
                    <div class="player-card-count">${player.hand?.length || 0} 🃏</div>
                </div>
            `).join('');
        }
        
        function updatePlayedCard(card) {
            const playedCardDiv = document.getElementById('playedCard');
            if (card.rank === 'JOKER') {
                playedCardDiv.innerHTML = '🃏';
                playedCardDiv.style.fontSize = '4em';
                playSound('joker');
            } else {
                const suitSymbol = getSuitSymbol(card.suit);
                playedCardDiv.innerHTML = `${card.rank}<br>${suitSymbol}`;
                playedCardDiv.style.color = (card.suit === 'hearts' || card.suit === 'diamonds') ? 'red' : 'black';
            }
        }
        
        function getSuitSymbol(suit) {
            const symbols = { hearts: '♥️', diamonds: '♦️', clubs: '♣️', spades: '♠️', joker: '🃏' };
            return symbols[suit] || '?';
        }
        
        function getSuitName(suit) {
            const names = { hearts: '♥️ قلوب', diamonds: '♦️ ديناري', clubs: '♣️ سبايدس', spades: '♠️ بستوني', joker: '🃏 جوكر' };
            return names[suit] || suit;
        }
        
        function addGameMessage(message) {
            const messagesDiv = document.getElementById('gameMessages');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message';
            msgDiv.innerHTML = message;
            messagesDiv.appendChild(msgDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            
            setTimeout(() => {
                if (messagesDiv.children.length > 20) {
                    messagesDiv.removeChild(messagesDiv.firstChild);
                }
            }, 100);
        }
        
        function startTurnTimer() {
            if (turnTimerInterval) clearInterval(turnTimerInterval);
            
            turnTimerInterval = setInterval(async () => {
                if (!gameData || gameData.gameEnded || gameData.currentTurn !== currentUser.uid) {
                    clearInterval(turnTimerInterval);
                    return;
                }
                
                const elapsed = Date.now() - gameData.turnStartTime;
                const remaining = Math.max(0, 30000 - elapsed);
                const seconds = Math.ceil(remaining / 1000);
                
                const timerElement = document.getElementById('turnTimer');
                timerElement.textContent = seconds;
                
                if (seconds <= 5) {
                    timerElement.classList.add('danger');
                    if (seconds === 5) playSound('timeout');
                } else if (seconds <= 10) {
                    timerElement.classList.add('warning');
                } else {
                    timerElement.classList.remove('warning', 'danger');
                }
                
                if (remaining <= 0) {
                    clearInterval(turnTimerInterval);
                    await autoPass();
                }
            }, 1000);
        }
        
        async function autoPass() {
            addGameMessage('⏰ انتهى الوقت، تم تمرير الدور تلقائياً');
            await database.ref(`games/${currentGameId}`).update({
                currentTurn: getNextPlayer(),
                turnStartTime: Date.now()
            });
        }
        
        async function handleWin(winnerId) {
            playSound('win');
            const winner = gameData.players[winnerId];
            addGameMessage(`🏆 ${winner.name} فاز باللعبة! 🏆`);
            
            // تحديث الإحصائيات
            if (!winner.isAI && winnerId !== 'guest') {
                await updateStats(winnerId, true);
            }
            
            for (let pid in gameData.players) {
                if (pid !== winnerId && !gameData.players[pid].isAI && pid !== 'guest') {
                    await updateStats(pid, false);
                }
            }
            
            setTimeout(() => {
                showVictoryScreen(winner.name);
            }, 2000);
        }
        
        async function updateStats(uid, isWinner) {
            const updates = { gamesPlayed: firebase.database.ServerValue.increment(1) };
            if (isWinner) {
                updates.wins = firebase.database.ServerValue.increment(1);
                updates.xp = firebase.database.ServerValue.increment(50);
                updates.coins = firebase.database.ServerValue.increment(20);
            } else {
                updates.losses = firebase.database.ServerValue.increment(1);
                updates.xp = firebase.database.ServerValue.increment(10);
                updates.coins = firebase.database.ServerValue.increment(5);
            }
            await database.ref(`users/${uid}`).update(updates);
        }
        
        function showVictoryScreen(winnerName) {
            const modal = document.createElement('div');
            modal.className = 'victory-modal';
            modal.innerHTML = `
                <div class="victory-content">
                    <div class="victory-trophy">🏆</div>
                    <h2>${winnerName} فاز باللعبة!</h2>
                    <p>🎉 +50 XP | +20 عملة 🎉</p>
                    <button onclick="window.location.href='index.html'">🏠 الرئيسية</button>
                    <button onclick="window.location.reload()">🎮 لعبة جديدة</button>
                </div>
            `;
            document.body.appendChild(modal);
        }
        
        function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            if (message) {
                sendChatMessageToGame(message, currentGameId);
                input.value = '';
            }
        }
        
        function sendEmoji(emoji) {
            sendChatMessageToGame(emoji, currentGameId);
        }
        
        function toggleChat() {
            const chatContainer = document.querySelector('.chat-container');
            chatContainer.classList.toggle('collapsed');
        }
        
        function leaveGame() {
            if (confirm('هل تريد مغادرة اللعبة؟')) {
                database.ref(`games/${currentGameId}/players/${currentUser.uid}`).remove();
                window.location.href = 'index.html';
            }
        }
        
        function handleGameEnd() {
            if (turnTimerInterval) clearInterval(turnTimerInterval);
        }
        
        // بدء اللعبة
        auth.onAuthStateChanged(user => {
            if (!user && !localStorage.getItem('guestUser')) {
                window.location.href = 'index.html';
            } else {
                currentUser = user || JSON.parse(localStorage.getItem('guestUser'));
                loadGame();
                listenToChat(currentGameId);
            }
        });
    </script>
</body>
                      </html>
