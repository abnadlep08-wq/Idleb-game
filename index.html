<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جاري اللعب - JOKER</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            padding: 20px;
            color: white;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .header {
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .game-code {
            background: rgba(0,0,0,0.5);
            padding: 5px 15px;
            border-radius: 20px;
            font-family: monospace;
            font-size: 1.2rem;
        }
        .turn {
            background: #f59e0b;
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: bold;
        }
        .leave-btn {
            background: #e53e3e;
            border: none;
            padding: 8px 20px;
            border-radius: 30px;
            color: white;
            cursor: pointer;
        }
        .players {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .player-card {
            background: rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 10px 20px;
            text-align: center;
            min-width: 100px;
        }
        .player-card.active {
            background: #f59e0b;
            border: 2px solid white;
        }
        .player-name {
            font-weight: bold;
        }
        .player-cards {
            font-size: 1.5rem;
            font-weight: bold;
        }
        .center {
            display: flex;
            justify-content: center;
            gap: 50px;
            margin: 30px 0;
        }
        .deck, .played {
            text-align: center;
        }
        .deck-card, .played-card {
            width: 100px;
            height: 140px;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin-bottom: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .hand {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 30px 0;
            min-height: 180px;
        }
        .card {
            width: 80px;
            height: 110px;
            background: white;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            color: black;
        }
        .card.selected {
            transform: translateY(-15px);
            border: 3px solid #f59e0b;
            box-shadow: 0 0 15px #f59e0b;
        }
        .card-rank {
            font-size: 1.8rem;
            font-weight: bold;
        }
        .card-suit {
            font-size: 2rem;
        }
        .controls {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }
        button {
            padding: 12px 30px;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .play-btn {
            background: #38a169;
            color: white;
        }
        .pass-btn {
            background: #e53e3e;
            color: white;
        }
        .messages {
            background: rgba(0,0,0,0.5);
            border-radius: 15px;
            padding: 15px;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
        }
        .message {
            padding: 5px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            font-size: 0.9rem;
        }
        .back-home {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="game-code" id="gameCode">---</div>
            <div class="turn" id="turnText">⏳ جاري التحميل...</div>
            <button class="leave-btn" onclick="leaveGame()">🚪 مغادرة</button>
        </div>

        <div class="players" id="playersList"></div>

        <div class="center">
            <div class="deck">
                <div class="deck-card">🃟</div>
                <div id="deckCount">0</div>
            </div>
            <div class="played">
                <div class="played-card" id="playedCard">🎴</div>
                <div id="currentSuit"></div>
            </div>
        </div>

        <div class="hand" id="hand"></div>

        <div class="controls">
            <button id="playBtn" class="play-btn" disabled>🎯 رمي الورقة</button>
            <button id="passBtn" class="pass-btn" disabled>⏭️ تمرير</button>
        </div>

        <div class="messages" id="messages"></div>
        <a href="index.html" class="back-home">🏠 العودة للرئيسية</a>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <script>
        // إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyD-W-YXdIkNwJ3S2myifrdphHaxkmG0mw",
            authDomain: "goker-idleb.firebaseapp.com",
            databaseURL: "https://goker-idleb-default-rtdb.firebaseio.com",
            projectId: "goker-idleb",
            storageBucket: "goker-idleb.firebasestorage.app",
            messagingSenderId: "803496116662",
            appId: "1:803496116662:web:8becc21797bc6c2d208117"
        };

        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        let gameId = null;
        let currentUser = null;
        let gameData = null;
        let selectedCardIndex = null;

        // الحصول على معاملات الرابط
        const urlParams = new URLSearchParams(window.location.search);
        gameId = urlParams.get('gameId');

        if (!gameId) {
            window.location.href = 'index.html';
        }

        document.getElementById('gameCode').innerText = gameId;

        function addMessage(msg) {
            const msgsDiv = document.getElementById('messages');
            const div = document.createElement('div');
            div.className = 'message';
            div.innerHTML = msg;
            msgsDiv.appendChild(div);
            msgsDiv.scrollTop = msgsDiv.scrollHeight;
        }

        function updateUI() {
            if (!gameData) return;
            
            const currentPlayer = gameData.players[currentUser?.uid];
            if (!currentPlayer) return;

            const isMyTurn = gameData.currentTurn === currentUser?.uid;
            
            // تحديث مؤشر الدور
            const turnText = document.getElementById('turnText');
            if (isMyTurn) {
                turnText.innerHTML = '🎯 دورك الآن!';
                turnText.style.background = '#38a169';
            } else {
                const playerTurn = gameData.players[gameData.currentTurn];
                turnText.innerHTML = `⏳ دور: ${playerTurn?.name || 'اللاعب'}`;
                turnText.style.background = '#f59e0b';
            }

            // تحديث اللاعبين
            const playersDiv = document.getElementById('playersList');
            playersDiv.innerHTML = Object.values(gameData.players).map(p => `
                <div class="player-card ${gameData.currentTurn === p.id ? 'active' : ''}">
                    <div class="player-name">${p.name}</div>
                    <div class="player-cards">${p.hand?.length || 0} 🃏</div>
                </div>
            `).join('');

            // تحديث البطاقة الملعوبة
            if (gameData.playedCards && gameData.playedCards.length > 0) {
                const lastCard = gameData.playedCards[gameData.playedCards.length - 1];
                const playedDiv = document.getElementById('playedCard');
                if (lastCard.rank === 'JOKER') {
                    playedDiv.innerHTML = '🃏';
                } else {
                    playedDiv.innerHTML = `${lastCard.rank}<br>${lastCard.suit === 'hearts' ? '♥️' : lastCard.suit === 'diamonds' ? '♦️' : lastCard.suit === 'clubs' ? '♣️' : '♠️'}`;
                }
                document.getElementById('currentSuit').innerHTML = `النوع: ${lastCard.suit}`;
            }

            // تحديث عدد البطاقات
            document.getElementById('deckCount').innerHTML = gameData.deck?.length || 0;

            // تحديث الأوراق
            const handDiv = document.getElementById('hand');
            handDiv.innerHTML = '';
            currentPlayer.hand.forEach((card, i) => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'card';
                if (selectedCardIndex === i) cardDiv.classList.add('selected');
                if (card.rank === 'JOKER') {
                    cardDiv.innerHTML = '<div class="card-rank">🃏</div><div class="card-suit">JOKER</div>';
                } else {
                    const suitSym = card.suit === 'hearts' ? '♥️' : card.suit === 'diamonds' ? '♦️' : card.suit === 'clubs' ? '♣️' : '♠️';
                    cardDiv.innerHTML = `<div class="card-rank">${card.rank}</div><div class="card-suit">${suitSym}</div>`;
                }
                cardDiv.onclick = () => {
                    selectedCardIndex = i;
                    updateUI();
                };
                handDiv.appendChild(cardDiv);
            });

            // تحديث الأزرار
            const playBtn = document.getElementById('playBtn');
            const passBtn = document.getElementById('passBtn');
            if (isMyTurn && !gameData.gameEnded) {
                playBtn.disabled = false;
                const hasMatching = currentPlayer.hand.some(c => c.suit === gameData.currentSuit && c.rank !== 'JOKER');
                passBtn.disabled = hasMatching;
            } else {
                playBtn.disabled = true;
                passBtn.disabled = true;
            }
        }

        async function playCard() {
            if (selectedCardIndex === null) {
                addMessage('⚠️ اختر ورقة أولاً');
                return;
            }

            const currentPlayer = gameData.players[currentUser.uid];
            const card = currentPlayer.hand[selectedCardIndex];
            
            // التحقق من صحة الحركة
            if (card.rank !== 'JOKER' && card.suit !== gameData.currentSuit) {
                const hasMatching = currentPlayer.hand.some(c => c.suit === gameData.currentSuit && c.rank !== 'JOKER');
                if (hasMatching) {
                    addMessage('❌ يجب رمي ورقة من نفس النوع!');
                    return;
                }
            }

            // إزالة البطاقة
            const newHand = [...currentPlayer.hand];
            newHand.splice(selectedCardIndex, 1);

            // تحديث اللعبة
            const updates = {
                [`players/${currentUser.uid}/hand`]: newHand,
                [`playedCards`]: [...gameData.playedCards, card],
                [`currentSuit`]: card.rank === 'JOKER' ? gameData.currentSuit : card.suit
            };

            // تغيير الدور
            const order = gameData.playersOrder;
            const currentIdx = order.indexOf(gameData.currentTurn);
            const nextIdx = (currentIdx + 1) % order.length;
            updates.currentTurn = order[nextIdx];

            // التحقق من الفوز
            if (newHand.length === 0) {
                updates.gameEnded = true;
                updates.winner = currentUser.uid;
                addMessage(`🎉 ${currentPlayer.name} فاز باللعبة! 🎉`);
            }

            await database.ref(`games/${gameId}`).update(updates);
            selectedCardIndex = null;
        }

        async function passTurn() {
            const currentPlayer = gameData.players[currentUser.uid];
            const hasMatching = currentPlayer.hand.some(c => c.suit === gameData.currentSuit && c.rank !== 'JOKER');
            
            if (hasMatching) {
                addMessage('❌ لا يمكنك التمرير! لديك ورقة من نفس النوع');
                return;
            }

            const order = gameData.playersOrder;
            const currentIdx = order.indexOf(gameData.currentTurn);
            const nextIdx = (currentIdx + 1) % order.length;
            
            await database.ref(`games/${gameId}`).update({
                currentTurn: order[nextIdx]
            });
            
            addMessage(`⏭️ ${currentPlayer.name} قام بالتمرير`);
        }

        function leaveGame() {
            if (confirm('هل تريد مغادرة اللعبة؟')) {
                window.location.href = 'index.html';
            }
        }

        // ربط الأزرار
        document.getElementById('playBtn').onclick = playCard;
        document.getElementById('passBtn').onclick = passTurn;

        // الاستماع للعبة
        auth.onAuthStateChanged(async (user) => {
            const guest = localStorage.getItem('guestUser');
            if (user) {
                currentUser = user;
            } else if (guest) {
                currentUser = JSON.parse(guest);
            } else {
                window.location.href = 'index.html';
                return;
            }

            // الاستماع لتحديثات اللعبة
            database.ref(`games/${gameId}`).on('value', (snapshot) => {
                gameData = snapshot.val();
                if (gameData) {
                    updateUI();
                    if (gameData.gameEnded) {
                        setTimeout(() => {
                            window.location.href = 'index.html';
                        }, 3000);
                    }
                }
            });
        });
    </script>
</body>
</html>
